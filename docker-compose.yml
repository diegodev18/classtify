services:
  postgres:
    image: postgres:16
    container_name: classtify-postgres
    environment:
      POSTGRES_USER: classtify
      POSTGRES_PASSWORD: classtify
      POSTGRES_DB: classtify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U classtify -d classtify"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: classtify-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://classtify:classtify@postgres:5432/classtify
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: '["http://localhost:1420"]'
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-anthropic/claude-sonnet-4}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
